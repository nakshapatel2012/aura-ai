<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura AI - Free & Open</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        aura: { dark: '#0f172a', light: '#f8fafc', primary: '#3b82f6' }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Marked (for Markdown parsing) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(156, 163, 175, 0.3); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(156, 163, 175, 0.5); }
        
        .glass-pill { 
            background: rgba(30, 41, 59, 0.8); 
            backdrop-filter: blur(24px); 
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5); 
        }
        
        .bg-custom-wallpaper {
            background-image: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=2564&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }
        
        .prose pre { background-color: #1e293b; padding: 1rem; border-radius: 0.75rem; overflow-x: auto; margin-top: 0.5rem; margin-bottom: 0.5rem; border: 1px solid rgba(255,255,255,0.05); }
        .prose code { color: #38bdf8; font-family: monospace; font-size: 0.9em; padding: 0.1rem 0.3rem; background: rgba(0,0,0,0.2); border-radius: 0.25rem; }
        .prose p { margin-bottom: 0.75rem; }
        .prose p:last-child { margin-bottom: 0; }
        .prose ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 0.75rem; }
        .prose ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 0.75rem; }
        .prose h1, .prose h2, .prose h3 { font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.5rem; color: #f8fafc; }
        .prose a { color: #60a5fa; text-decoration: underline; }
    </style>
</head>
<body class="h-screen w-screen relative flex flex-col bg-custom-wallpaper">
    <div class="absolute inset-0 bg-slate-900/80 backdrop-blur-[2px] z-0"></div>
    <div id="root" class="h-full w-full z-10"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [messages, setMessages] = useState([
                { role: 'assistant', content: 'Hello! I am Aura AI, an open and free AI model built to mimic Gemini.\n\nI operate completely silently in the background with zero popups, zero API keys needed, and complete privacy. How can I assist you today?' }
            ]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const messagesEndRef = useRef(null);

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages]);

            const handleSend = async (e) => {
                e.preventDefault();
                if (!input.trim() || loading) return;
                
                const userMsg = input.trim();
                const newMsgs = [...messages, { role: 'user', content: userMsg }];
                setMessages(newMsgs);
                setInput('');
                setLoading(true);

                // Add empty assistant message placeholder for streaming
                setMessages(prev => [...prev, { role: 'assistant', content: '' }]);
                
                try {
                    // Send to free open API (no popups, no api keys needed)
                    const response = await fetch('https://text.pollinations.ai/openai', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            messages: [
                                { role: 'system', content: 'You are Aura AI, a highly advanced assistant mimicking the capabilities of Google Gemini.' },
                                ...newMsgs.map(m => ({ role: m.role, content: m.content }))
                            ],
                            stream: true
                        })
                    });

                    if (!response.ok) throw new Error("Network response was not ok");
                    
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder('utf-8');
                    let fullResponse = '';

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        const chunk = decoder.decode(value, { stream: true });
                        const lines = chunk.split('\n');
                        for (const line of lines) {
                            if (line.startsWith('data: ') && line.trim() !== 'data: [DONE]') {
                                try {
                                    const data = JSON.parse(line.slice(6));
                                    if (data.choices && data.choices[0].delta && data.choices[0].delta.content) {
                                        fullResponse += data.choices[0].delta.content;
                                        setMessages(prev => {
                                            const updated = [...prev];
                                            updated[updated.length - 1].content = fullResponse;
                                            return updated;
                                        });
                                    }
                                } catch (e) {
                                    // ignore parse errors for partial chunks
                                }
                            }
                        }
                    }
                } catch (err) {
                    console.error("API Error:", err);
                    setMessages(prev => {
                        const updated = [...prev];
                        updated[updated.length - 1].content = `**Error connecting to AI:** ${err.message}`;
                        return updated;
                    });
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="flex flex-col h-full w-full max-w-4xl mx-auto relative">
                    {/* Header */}
                    <div className="py-6 px-4 sm:px-8 flex items-center justify-between z-10 shrink-0">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 rounded-2xl bg-slate-800/80 border border-slate-700/50 flex items-center justify-center shadow-[0_0_20px_rgba(59,130,246,0.2)] overflow-hidden">
                                <img src="logo.png" alt="Aura AI" className="w-full h-full object-cover" />
                            </div>
                            <div>
                                <h1 className="font-bold text-2xl tracking-tight text-white">Aura AI</h1>
                                <div className="flex items-center gap-2 mt-0.5">
                                    <span className="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
                                    <span className="text-xs text-emerald-400 font-medium">Free API Active</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Chat Area */}
                    <div className="flex-1 overflow-y-auto px-4 sm:px-8 pb-32 scroll-smooth">
                        <div className="space-y-8 mt-4">
                            {messages.map((m, i) => (
                                <div key={i} className={`flex gap-4 ${m.role === 'user' ? 'flex-row-reverse' : ''} animate-[fadeIn_0.3s_ease-out]`}>
                                    <div className={`w-10 h-10 rounded-full flex items-center justify-center shrink-0 shadow-md overflow-hidden ${m.role === 'user' ? 'bg-blue-600 text-white' : 'bg-slate-800 border border-slate-700 text-blue-400 shadow-[0_0_15px_rgba(59,130,246,0.15)]'}`}>
                                        {m.role === 'user' ? <i className="fas fa-user text-sm"></i> : <img src="logo.png" alt="Aura" className="w-full h-full object-cover" />}
                                    </div>
                                    <div className={`max-w-[85%] ${m.role === 'user' ? 'bg-blue-600 text-white px-5 py-3 rounded-2xl rounded-tr-sm shadow-sm' : 'text-gray-200 mt-1.5'}`}>
                                        {m.role === 'user' ? (
                                            <div className="whitespace-pre-wrap leading-relaxed">{m.content}</div>
                                        ) : (
                                            <div className="prose prose-invert max-w-none text-[15px] leading-relaxed" dangerouslySetInnerHTML={{ __html: window.marked ? marked.parse(m.content) : m.content }} />
                                        )}
                                        {m.role === 'assistant' && !m.content && loading && (
                                            <div className="flex items-center gap-1.5 h-6">
                                                <span className="w-2 h-2 rounded-full bg-blue-500 animate-bounce"></span>
                                                <span className="w-2 h-2 rounded-full bg-blue-500 animate-bounce" style={{animationDelay: '0.2s'}}></span>
                                                <span className="w-2 h-2 rounded-full bg-blue-500 animate-bounce" style={{animationDelay: '0.4s'}}></span>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ))}
                            <div ref={messagesEndRef} className="h-4" />
                        </div>
                    </div>

                    {/* Input Taskbar (Floating Pill) */}
                    <div className="absolute bottom-8 left-0 right-0 px-4 sm:px-8 flex justify-center pointer-events-none">
                        <div className="w-full max-w-3xl glass-pill rounded-[2rem] p-2 pointer-events-auto transition-all duration-300 hover:shadow-[0_15px_50px_-10px_rgba(59,130,246,0.3)]">
                            <form onSubmit={handleSend} className="relative flex items-center bg-slate-900/60 rounded-full border border-slate-700/50 pr-2 transition-colors focus-within:bg-slate-900/80 focus-within:border-blue-500/50">
                                <button type="button" className="w-14 h-14 flex items-center justify-center text-slate-400 hover:text-white transition rounded-full shrink-0 group" title="Attachments (Coming soon)">
                                    <i className="fas fa-plus-circle text-xl group-hover:scale-110 transition-transform"></i>
                                </button>
                                <input 
                                    type="text" 
                                    value={input} 
                                    onChange={e => setInput(e.target.value)} 
                                    placeholder="Message Aura AI..." 
                                    className="flex-1 py-4 bg-transparent outline-none text-white placeholder-slate-500 text-lg"
                                    disabled={loading}
                                    autoFocus
                                />
                                <button 
                                    type="submit" 
                                    disabled={loading || !input.trim()} 
                                    className={`w-11 h-11 rounded-full flex items-center justify-center transition shrink-0 ml-2 ${loading || !input.trim() ? 'bg-slate-800 text-slate-500 cursor-not-allowed' : 'bg-white text-black hover:scale-105 active:scale-95 shadow-lg'}`}
                                >
                                    <i className="fas fa-arrow-up"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
